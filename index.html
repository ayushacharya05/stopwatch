<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Stopwatch</title>
    <style>
        /* Import a clean, modern monospace font for stable number layouts */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&family=Space+Mono:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Ambient subtle glow in the background */
        .background-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        /* Time Display */
        .display-container {
            position: relative;
        }

        .time-display {
            font-family: 'Space Mono', monospace;
            font-size: 5.5rem;
            font-weight: 400;
            letter-spacing: -2px;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: baseline;
        }

        .ms {
            font-size: 2.5rem;
            opacity: 0.4;
            margin-left: 8px;
            font-weight: 300;
            letter-spacing: 0px;
        }

        /* Controls Area */
        .controls {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        /* Sleek Button Styling */
        button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            padding: 0.8rem 2.2rem;
            font-size: 0.95rem;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        button:hover {
            border-color: rgba(255, 255, 255, 1);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        button:active {
            transform: scale(0.97);
        }

        /* Distinct look for the primary action button */
        button#startStopBtn {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            font-weight: 500;
        }

        button#startStopBtn:hover {
            background: transparent;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        /* Hidden Lap Button State when not needed */
        .secondary-btn {
            opacity: 0.3;
            pointer-events: none;
        }

        .secondary-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Lap List Container */
        .laps-container {
            max-height: 160px;
            overflow-y: auto;
            width: 280px;
            margin-top: 1rem;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
        }

        .laps-container::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome/Safari */
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            animation: fadeIn 0.4s ease;
        }

        .lap-item span:first-child {
            letter-spacing: 0.05em;
        }

        .lap-item span:last-child {
            color: rgba(255, 255, 255, 0.9);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container">
        <!-- Time Display -->
        <div class="display-container">
            <div class="time-display">
                <span id="mainTime">00:00:00</span><span class="ms" id="msTime">.00</span>
            </div>
        </div>

        <!-- Interactive Controls -->
        <div class="controls">
            <button id="lapResetBtn" class="secondary-btn">Lap</button>
            <button id="startStopBtn">Start</button>
        </div>

        <!-- Minimalist Lap Record -->
        <div class="laps-container" id="lapsContainer"></div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        let lapCount = 0;

        const mainTimeDisplay = document.getElementById('mainTime');
        const msTimeDisplay = document.getElementById('msTime');
        const startStopBtn = document.getElementById('startStopBtn');
        const lapResetBtn = document.getElementById('lapResetBtn');
        const lapsContainer = document.getElementById('lapsContainer');

        function formatTime(time) {
            let hrs = Math.floor(time / 3600000);
            let mins = Math.floor((time % 3600000) / 60000);
            let secs = Math.floor((time % 60000) / 1000);
            let ms = Math.floor((time % 1000) / 10);

            let hrsStr = hrs > 0 ? (hrs < 10 ? '0' + hrs : hrs) + ':' : '';
            let minsStr = (mins < 10 ? '0' + mins : mins) + ':';
            let secsStr = secs < 10 ? '0' + secs : secs;
            let msStr = '.' + (ms < 10 ? '0' + ms : ms);

            return {
                main: `${hrsStr}${minsStr}${secsStr}`,
                ms: msStr
            };
        }

        function printTime() {
            elapsedTime = Date.now() - startTime;
            const formatted = formatTime(elapsedTime);
            mainTimeDisplay.textContent = formatted.main;
            msTimeDisplay.textContent = formatted.ms;
        }

        function start() {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(printTime, 10);
            startStopBtn.textContent = 'Pause';
            lapResetBtn.textContent = 'Lap';
            lapResetBtn.classList.add('active');
            isRunning = true;
        }

        function stop() {
            clearInterval(timerInterval);
            startStopBtn.textContent = 'Resume';
            lapResetBtn.textContent = 'Reset';
            isRunning = false;
        }

        function reset() {
            clearInterval(timerInterval);
            elapsedTime = 0;
            lapCount = 0;
            mainTimeDisplay.textContent = '00:00:00';
            msTimeDisplay.textContent = '.00';
            startStopBtn.textContent = 'Start';
            lapResetBtn.textContent = 'Lap';
            lapResetBtn.classList.remove('active');
            lapsContainer.innerHTML = '';
            isRunning = false;
        }

        function recordLap() {
            lapCount++;
            const formatted = formatTime(elapsedTime);
            
            const lapItem = document.createElement('div');
            lapItem.classList.add('lap-item');
            lapItem.innerHTML = `
                <span>LAP ${lapCount < 10 ? '0' + lapCount : lapCount}</span>
                <span>${formatted.main}${formatted.ms}</span>
            `;
            
            lapsContainer.insertBefore(lapItem, lapsContainer.firstChild);
        }

        startStopBtn.addEventListener('click', () => {
            if (!isRunning) {
                start();
            } else {
                stop();
            }
        });

        lapResetBtn.addEventListener('click', () => {
            if (isRunning) {
                recordLap();
            } else {
                if (elapsedTime > 0) {
                    reset();
                }
            }
        });
    </script>
</body>
</html>
