<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Stopwatch</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            /* Using a clean, geometric sans-serif stack to closely match image_3d61eb.png */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            cursor: pointer;
        }

        .stopwatch-display {
            /* Large, high-impact typography matching the reference image layout */
            font-size: 15vw; 
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1;
            text-align: center;
            width: 100%;
            padding: 0 5vw;
            /* Feature tabular-nums to prevent characters from shifting layout during count */
            font-variant-numeric: tabular-nums; 
        }
    </style>
</head>
<body>

    <div class="stopwatch-display" id="display">00:00:00</div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;

        const displayEl = document.getElementById('display');

        function formatTime(time) {
            let mins = Math.floor(time / 60000);
            let secs = Math.floor((time % 60000) / 1000);
            let ms = Math.floor((time % 1000) / 10);

            // Roll over minutes if they exceed 99 to keep the exact 6-digit structure
            let minsStr = String(mins % 100).padStart(2, '0');
            let secsStr = String(secs).padStart(2, '0');
            let msStr = String(ms).padStart(2, '0');

            // Formatted exactly as MM:SS:MS to mirror the image reference
            return `${minsStr}:${secsStr}:${msStr}`;
        }

        function updateDisplay() {
            elapsedTime = Date.now() - startTime;
            displayEl.textContent = formatTime(elapsedTime);
        }

        function toggleTimer() {
            if (!isRunning) {
                // Start / Resume
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateDisplay, 10);
                isRunning = true;
            } else {
                // Pause
                clearInterval(timerInterval);
                isRunning = false;
            }
        }

        function resetTimer(e) {
            // Prevent standard click action when double-clicking
            e.stopPropagation(); 
            
            clearInterval(timerInterval);
            elapsedTime = 0;
            displayEl.textContent = "00:00:00";
            isRunning = false;
        }

        // Tap/Click anywhere on the screen to Start or Pause
        document.body.addEventListener('click', toggleTimer);

        // Double-click anywhere on the screen to Reset
        document.body.addEventListener('dblclick', resetTimer);
    </script>
</body>
</html>
